name: Build AltTab Free DMG

# Release pipeline: every push to master builds the patched (free) AltTab,
# signs it with the fork's self-signed certificate (stable identity => macOS
# permissions survive updates), packages a .dmg (manual install) and a .zip
# (Sparkle auto-update), signs the zip with the fork's Sparkle EdDSA key, and
# publishes everything as a GitHub Release together with appcast.xml.
#
# Installed apps point at .../releases/latest/download/appcast.xml, so cutting
# a release here IS the update push — Sparkle picks it up on its next check.
#
# Secrets:
#   MACOS_CERT_P12_BASE64 / MACOS_CERT_P12_PASSWORD — self-signed codesign cert
#   SPARKLE_ED_PRIVATE_KEY — EdDSA private key matching SUPublicEDKey in Info.plist
# (backed up locally in ~/.config/alt-tab-free/)

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history
          fetch-tags: true    # need tags for version detection

      - name: Select latest stable Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)" || true

      - name: Determine version
        id: ver
        run: |
          # marketing version: highest upstream version tag
          V="$(git tag --sort=-v:refname | grep -E '^v?[0-9]' | head -1 | sed 's/^v//')"
          [ -z "$V" ] && V="0.0.0"
          V="${V#v}"
          # build version: marketing + monotonic commit count, so Sparkle sees
          # every master push as a newer version
          BUILD="$V.$(git rev-list --count HEAD)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Building AltTab Free $BUILD"

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings build.keychain   # no auto-lock
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" build.keychain > /dev/null
          security list-keychains -d user -s build.keychain login.keychain

      - name: Build (Release, unsigned)
        run: |
          xcodebuild -project alt-tab-macos.xcodeproj -scheme Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Stamp version + sign
        run: |
          APP="build/Build/Products/Release/AltTab.app"
          PL="$APP/Contents/Info.plist"
          V="${{ steps.ver.outputs.version }}"
          BUILD="${{ steps.ver.outputs.build }}"
          # upstream leaves CFBundleVersion as $(CURRENT_PROJECT_VERSION); blank crashes on launch
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PL" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD" "$PL"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $V" "$PL" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $V" "$PL"
          codesign --force --deep --sign "AltTab Free Dev" --keychain build.keychain "$APP"
          codesign --verify --deep "$APP"

      - name: Package DMG + update zip
        id: pkg
        run: |
          BUILD="${{ steps.ver.outputs.build }}"
          APP="build/Build/Products/Release/AltTab.app"
          # stable asset name so README can link releases/latest/download/AltTab-Free.dmg
          # (the release tag carries the version)
          DMG="AltTab-Free.dmg"
          ZIP="AltTab-Free-$BUILD.zip"
          mkdir -p dist/stage
          cp -R "$APP" "dist/stage/AltTab Free.app"
          # Sparkle update archive (zip keeps it small and fast to install)
          ditto -c -k --sequesterRsrc --keepParent "dist/stage/AltTab Free.app" "$ZIP"
          # DMG for first-time manual installs
          ln -s /Applications "dist/stage/Applications"
          hdiutil create -volname "AltTab Free" -srcfolder dist/stage \
            -ov -format UDZO "$DMG"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$DMG" "$ZIP"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          BUILD="${{ steps.ver.outputs.build }}"
          ZIP="${{ steps.pkg.outputs.zip }}"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > ed_key
          SIGNATURE="$(vendor/Sparkle/bin/sign_update --ed-key-file ed_key -p "$ZIP")"
          rm ed_key
          LENGTH="$(stat -f %z "$ZIP")"
          URL="https://github.com/${{ github.repository }}/releases/download/v$BUILD/$ZIP"
          cat > appcast.xml <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
            <channel>
              <title>AltTab Free</title>
              <language>en</language>
              <item>
                <title>Version $BUILD</title>
                <pubDate>$(date -u '+%a, %d %b %Y %H:%M:%S +0000')</pubDate>
                <sparkle:minimumSystemVersion>10.13</sparkle:minimumSystemVersion>
                <link>https://github.com/${{ github.repository }}/releases</link>
                <enclosure
                  url="$URL"
                  sparkle:version="$BUILD"
                  sparkle:shortVersionString="$V"
                  sparkle:edSignature="$SIGNATURE" length="$LENGTH"
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF
          cat appcast.xml

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD="${{ steps.ver.outputs.build }}"
          gh release create "v$BUILD" \
            --title "AltTab Free $BUILD" \
            --notes "$(git log -1 --pretty='%s (%h)')" \
            "${{ steps.pkg.outputs.dmg }}" \
            "${{ steps.pkg.outputs.zip }}" \
            appcast.xml
